<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>بطولة الغراقة الرمضانية - أهداف اللاعبين</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f0f2f5;padding:20px;direction:rtl;}
h1,h2,h3,h4{text-align:center;margin:10px;}
.group{padding:15px;margin-bottom:25px;border-radius:12px;color:#fff;box-shadow:0 4px 10px rgba(0,0,0,0.15);}
.group.A{background:linear-gradient(45deg,#4a90e2,#357abd);}
.group.B{background:linear-gradient(45deg,#27ae60,#1e8449);}
.group.E{background:linear-gradient(45deg,#f39c12,#d68910);}
.group.F{background:linear-gradient(45deg,#c0392b,#922b21);}
table{width:100%;border-collapse:collapse;margin-top:10px;background:#fff;color:#000;border-radius:8px;overflow:hidden;}
th,td{border:1px solid #ddd;padding:8px;text-align:center;}
button{padding:4px 8px;margin:2px;cursor:pointer;border-radius:6px;border:none;background:#333;color:#fff;}
input,select{padding:4px;margin-left:4px;}
.team-editable{cursor:pointer;font-weight:bold;}
</style>
</head>
<body>
<h1>🏆 بطولة الغراقة الرمضانية - أهداف اللاعبين</h1>
<div id="mainPanel"></div>
<div id="topScorers"><h2>ترتيب الهدافين</h2>
<table id="scorersTable"><thead><tr><th>اللاعب</th><th>الفريق</th><th>أهداف</th></tr></thead><tbody></tbody></table></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "gharaqa-ramadan.firebaseapp.com",
  databaseURL: "https://gharaqa-ramadan-default-rtdb.firebaseio.com",
  projectId: "gharaqa-ramadan"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const MASTER_PASSWORD="7890";
let isMaster=false;
if(location.search.includes("master")){
  const pw=prompt("ادخل كلمة سر الماستر");
  if(pw===MASTER_PASSWORD) isMaster=true;
}

const defaultGroups = {
  A:["أصدقاء عبدالوهاب","شباب الشوكة","محلة كيل","أصدقاء حوش عيسي","شباب كوم البوص","الغراقة الغربية"],
  B:["الشوكة الحاجر","الريف المصري","الصوالحية","اصدقاء محمد فؤاد","الزمالكاوية","البرنوجي"],
  E:["ممتاز","كوم البوص","نجع العزايم","شباب العساكرة","أنصاف","أصدقاء اسامه الجارحي"],
  F:["نجوم بطورس","الديابة","كوم القناطر","فلسطين","الحريفة","الغراقة الشرقية"]
};

let groups={A:[],B:[],E:[],F:[]};
const mainDiv=document.getElementById("mainPanel");

// التأكد من الفرق موجودة في Firebase
for(const g of ["A","B","E","F"]){
  get(ref(db,"teams/"+g)).then(snap=>{
    if(!snap.exists() || !Array.isArray(snap.val()) || snap.val().length===0){
      set(ref(db,"teams/"+g), defaultGroups[g]);
      // إضافة لاعب افتراضي لكل فريق
      defaultGroups[g].forEach(team=>{
        set(ref(db,"players/"+g+"/"+team),["لاعب1","لاعب2","لاعب3"]);
      });
    }
  });
}

// إنشاء واجهة كل مجموعة
for(const g of ["A","B","E","F"]){
  const div=document.createElement("div");
  div.className="group "+g;

  let html=`<h3>المجموعة ${g}${isMaster?" (تحكم)":""}</h3>
  <table id="table-${g}"><thead><tr><th>الفريق</th><th>لعب</th><th>فوز</th><th>تعادل</th><th>خسارة</th><th>+</th><th>-</th><th>فارق</th><th>نقاط</th></tr></thead><tbody></tbody></table>
  <h4>النتائج</h4>
  <table id="matches-${g}"><thead><tr><th>فريق</th><th>أهداف</th><th>فريق</th><th>أهداف</th>${isMaster?'<th>تعديل</th><th>حذف</th>':""}</tr></thead><tbody></tbody></table>`;

  if(isMaster){
    html+=`<div>
      <button onclick="addTeam('${g}')">إضافة فريق جديد</button>
    </div>
    <div>
      <select id="t1-${g}"></select>
      <input type="number" id="s1-${g}" value="0"> -
      <input type="number" id="s2-${g}" value="0">
      <select id="t2-${g}"></select>
      <button onclick="addMatch('${g}')">إضافة نتيجة</button>
    </div>`;
  }

  div.innerHTML=html;
  mainDiv.appendChild(div);

  onValue(ref(db,"teams/"+g),snap=>{
    const val=snap.val();
    if(val && Array.isArray(val)) groups[g]=val;
    fillSelects(g);
    listenGroup(g);
  });
}

function fillSelects(g){
  const t1Sel=document.getElementById(`t1-${g}`);
  const t2Sel=document.getElementById(`t2-${g}`);
  if(!t1Sel) return;
  t1Sel.innerHTML=""; t2Sel.innerHTML="";
  groups[g].forEach(t=>{
    t1Sel.add(new Option(t,t));
    t2Sel.add(new Option(t,t));
  });
}

// ================= إدارة الفرق =================
window.addTeam=async function(g){
  const name=prompt("ادخل اسم الفريق الجديد:");
  if(!name || name.trim()==="") return;
  groups[g].push(name);
  await set(ref(db,"teams/"+g),groups[g]);
  // إضافة لاعبين افتراضيين
  await set(ref(db,"players/"+g+"/"+name),["لاعب1","لاعب2","لاعب3"]);
}

// ================= إضافة نتائج + اختيار اللاعبين =================
window.addMatch=async function(g){
  const t1=document.getElementById(`t1-${g}`).value;
  const t2=document.getElementById(`t2-${g}`).value;
  const s1=parseInt(document.getElementById(`s1-${g}`).value)||0;
  const s2=parseInt(document.getElementById(`s2-${g}`).value)||0;
  if(t1===t2) return alert("اختار فريقين مختلفين");

  // جلب لاعبين الفريقين
  const snap1=await get(ref(db,"players/"+g+"/"+t1));
  const snap2=await get(ref(db,"players/"+g+"/"+t2));
  const players1=snap1.val()||[];
  const players2=snap2.val()||[];

  // إدخال أهداف اللاعبين
  const goalData1={}; const goalData2={};
  for(const p of players1){
    const n=parseInt(prompt(`أدخل عدد أهداف ${p} من فريق ${t1}:`,"0"))||0;
    if(n>0) goalData1[p]=n;
  }
  for(const p of players2){
    const n=parseInt(prompt(`أدخل عدد أهداف ${p} من فريق ${t2}:`,"0"))||0;
    if(n>0) goalData2[p]=n;
  }

  push(ref(db,"matches/"+g),{t1,t2,s1,s2,goalData1,goalData2,time:Date.now()});
}

window.editMatch=async function(g,k){
  const s1=prompt("هدف الفريق الأول");
  const s2=prompt("هدف الفريق الثاني");
  if(s1===null||s2===null) return;

  const matchRef=ref(db,"matches/"+g+"/"+k);
  const snap=await get(matchRef);
  const m=snap.val();
  const t1=m.t1; const t2=m.t2;

  const snap1=await get(ref(db,"players/"+g+"/"+t1));
  const snap2=await get(ref(db,"players/"+g+"/"+t2));
  const players1=snap1.val()||[];
  const players2=snap2.val()||[];

  const goalData1={}; const goalData2={};
  for(const p of players1){
    const n=parseInt(prompt(`أدخل عدد أهداف ${p} من فريق ${t1}:`,m.goalData1?.[p]||"0"))||0;
    if(n>0) goalData1[p]=n;
  }
  for(const p of players2){
    const n=parseInt(prompt(`أدخل عدد أهداف ${p} من فريق ${t2}:`,m.goalData2?.[p]||"0"))||0;
    if(n>0) goalData2[p]=n;
  }

  set(matchRef,{t1,t2,s1:parseInt(s1)||0,s2:parseInt(s2)||0,goalData1,goalData2,time:Date.now()});
}

window.delMatch=function(g,k){if(confirm("حذف؟")) set(ref(db,"matches/"+g+"/"+k),null);}

let groupStats={};

function listenGroup(g){
  onValue(ref(db,"matches/"+g),snap=>{
    const data=snap.val()||{};
    const teams={};
    groups[g].forEach(t=>teams[t]={name:t,p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
    for(const k in data){
      const m=data[k];
      const a=teams[m.t1], b=teams[m.t2];
      if(!a||!b) continue;
      a.p++; b.p++;
      a.gf+=m.s1; a.ga+=m.s2;
      b.gf+=m.s2; b.ga+=m.s1;
      if(m.s1>m.s2){a.w++;a.pts+=3;b.l++;}
      else if(m.s2>m.s1){b.w++;b.pts+=3;a.l++;}
      else{a.d++;b.d++;a.pts++;b.pts++;}
    }
    Object.values(teams).forEach(x=>x.gd=x.gf-x.ga);
    groupStats[g]=teams;

    const table=document.querySelector(`#table-${g} tbody`);
    const matches=document.querySelector(`#matches-${g} tbody`);
    table.innerHTML=""; matches.innerHTML="";
    Object.values(teams).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf).forEach(d=>{
      const clickable=isMaster?`<td class="team-editable">${d.name}</td>`:`<td>${d.name}</td>`;
      table.innerHTML+=`<tr>${clickable}<td>${d.p}</td><td>${d.w}</td><td>${d.d}</td><td>${d.l}</td><td>${d.gf}</td><td>${d.ga}</td><td>${d.gd}</td><td>${d.pts}</td></tr>`;
    });

    for(const k in data){
      const m=data[k];
      const editDel=isMaster?`<td><button onclick="editMatch('${g}','${k}')">تعديل</button></td><td><button onclick="delMatch('${g}','${k}')">حذف</button></td>`:"";
      matches.innerHTML+=`<tr><td>${m.t1}</td><td>${m.s1}</td><td>${m.t2}</td><td>${m.s2}</td>${editDel}</tr>`;
    }

    updateTopScorers();
  });
}

// ================= ترتيب الهدافين الحقيقيين =================
function updateTopScorers(){
  const scorers={};
  for(const g of ["A","B","E","F"]){
    const snap=groupStats[g];
    if(!snap) continue;
    for(const t in snap){
      const team=groupStats[g][t];
      const matchesRef=ref(db,"matches/"+g);
      onValue(matchesRef,s=>{
        const data=s.val()||{};
        for(const k in data){
          const m=data[k];
          const addGoals=(goalData)=>{
            if(!goalData) return;
            for(const p in goalData){
              scorers[p+"|"+(m.t1===t||m.t2===t?t:m.t1)] = (scorers[p+"|"+(m.t1===t||m.t2===t?t:m.t1)]||0)+goalData[p];
            }
          }
          addGoals(m.goalData1);
          addGoals(m.goalData2);
        }
        const tbody=document.querySelector("#scorersTable tbody");
        tbody.innerHTML="";
        Object.entries(scorers).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
          const [player,team]=k.split("|");
          tbody.innerHTML+=`<tr><td>${player}</td><td>${team}</td><td>${v}</td></tr>`;
        });
      }, {onlyOnce:true});
    }
  }
}
</script>
</body>
</html>
